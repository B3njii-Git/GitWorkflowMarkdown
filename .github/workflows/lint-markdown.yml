name: "Run Markdownlint"

# Se dispara en cada push o pull_request según la pauta
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout: Uso de la acción oficial v4
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 67]

      # 2. Markdown Lint: Implementar el paso de revisión
      - name: "Run Markdownlint"
        [cite_start]uses: davidanson/markdownlint-cli2-action@v16 [cite: 80]
        with:
          # Busca automáticamente tu archivo .markdownlint.json
          [cite_start]config: '.markdownlint.json' [cite: 82]
          # Revisa todos los archivos markdown del repo
          [cite_start]globs: '**/*.md' [cite: 84]